<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/style.css">

  <!-- Google tag (gtag.js) -->
  {% if jekyll.environment == "production" %}

  <script>
  /* ---------------------------------
    RS personal-traffic detection
  ---------------------------------- */

  // change this for each site
  const GA_ID = "G-2NV7GQH8EY";

  /* check if this browser is marked as RS */
  const isRS = document.cookie.includes("RSVisitor=true");

  /* OPTIONAL: disable GA entirely for you */
  if (isRS) {
  }

  /* if not disabling, at least tag yourself */
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  if (isRS) {
    gtag('set', {
      'user_properties': {
        visitor_type: 'owner'
      }
    });
  }
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NV7GQH8EY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-2NV7GQH8EY');
  </script>
  {% endif %}

</head>
<body>
  <main>
    {{ content }}
  </main>

  <footer style="text-align:center; font-size:0.9rem; color:#555; margin-top:3rem;">
    &copy; {{ "now" | date: "%Y" }} {% if site.title %}{{ site.title }}{% else %}Rachelsprague{% endif %} · 
    <a href="/privacy" style="color:#555; text-decoration:underline;">Privacy Policy</a>
  </footer>

</body>
</html>
